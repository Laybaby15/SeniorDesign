<!DOCTYPE html>
<html>
<head>
    <title>Leaflet Test</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        #map {
            height: 500px;
            width: 100%;
        }
    </style>
</head>
<body>

<h2>My First Map</h2>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// Step 1: Create map
var map = L.map('map').setView([31.4502, -83.5082], 16);

// Step 2: Add map tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

// Step 3: Load GeoJSON
fetch('graves.geojson')
    .then(response => response.json())
    .then(data => {
        L.geoJSON(data, {
            onEachFeature: function(feature, layer) {
                layer.bindPopup(
                    "<b>" + feature.properties.full_name + "</b><br>" +
                    "Section: " + feature.properties.section + "<br>" +
                    "Plot: " + feature.properties.plot_number
                );
            }
        }).addTo(map);
    });

</script>

</body>
</html>
